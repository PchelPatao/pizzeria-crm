version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pizzeria_user
      POSTGRES_PASSWORD: pizzeria_password
      POSTGRES_DB: pizzeria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizzeria_user -d pizzeria_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://pizzeria_user:pizzeria_password@db/pizzeria_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8080:80" # Exposed only to localhost to be proxyed by host Nginx
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
